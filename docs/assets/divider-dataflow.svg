<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="1200" height="40" role="img" aria-label="data-flow divider">
  <defs>
    <linearGradient id="df-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="20%"  stop-color="#ccccff" stop-opacity="0.3"/>
      <stop offset="50%"  stop-color="#ccccff" stop-opacity="0.5"/>
      <stop offset="80%"  stop-color="#ccccff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="df-glow" x="-5%" y="-200%" width="110%" height="500%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <path id="df-path" d="M -20,20 L 1220,20"/>
  </defs>

  <rect width="1200" height="40" fill="#1a1a2e"/>

  <!-- subtle base line -->
  <line x1="0" y1="20" x2="1200" y2="20" stroke="url(#df-line)" stroke-width="1"/>

  <!-- data packets: mint dots flowing left-to-right at different speeds -->
  <circle r="3" fill="#3ad29f" opacity="0.9" filter="url(#df-glow)">
    <animateMotion dur="4s" repeatCount="indefinite"><mpath href="#df-path"/></animateMotion>
    <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.05;0.95;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#3ad29f" opacity="0.7" filter="url(#df-glow)">
    <animateMotion dur="5.5s" repeatCount="indefinite" begin="0.8s"><mpath href="#df-path"/></animateMotion>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.05;0.95;1" dur="5.5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="2.5" fill="#ccccff" opacity="0.6" filter="url(#df-glow)">
    <animateMotion dur="6s" repeatCount="indefinite" begin="1.8s"><mpath href="#df-path"/></animateMotion>
    <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.05;0.95;1" dur="6s" repeatCount="indefinite" begin="1.8s"/>
  </circle>
  <circle r="1.8" fill="#3ad29f" opacity="0.5" filter="url(#df-glow)">
    <animateMotion dur="3.5s" repeatCount="indefinite" begin="2.5s"><mpath href="#df-path"/></animateMotion>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.05;0.95;1" dur="3.5s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <circle r="2" fill="#e94560" opacity="0.8" filter="url(#df-glow)">
    <animateMotion dur="7s" repeatCount="indefinite" begin="4s"><mpath href="#df-path"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.05;0.95;1" dur="7s" repeatCount="indefinite" begin="4s"/>
  </circle>

  <!-- center hub pulse -->
  <circle cx="600" cy="20" r="4" fill="none" stroke="#3ad29f" stroke-width="1" opacity="0">
    <animate attributeName="r" values="4;12" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
