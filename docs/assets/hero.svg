<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Unity MCP hero banner">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#21213f"/>
      <stop offset="55%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#141426"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#141426" stop-opacity="0.9"/>
      <stop offset="18%" stop-color="#141426" stop-opacity="0"/>
      <stop offset="82%" stop-color="#141426" stop-opacity="0"/>
      <stop offset="100%" stop-color="#141426" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="orbCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8fff0"/>
      <stop offset="35%" stop-color="#3ad29f"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3ad29f" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#3ad29f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3ad29f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ccccff"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="softText" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="360" fill="url(#bgGlow)"/>

  <!-- faint instrument grid -->
  <g stroke="#888899" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="300" y1="0" x2="300" y2="360"/>
    <line x1="600" y1="0" x2="600" y2="360"/>
    <line x1="900" y1="0" x2="900" y2="360"/>
  </g>

  <!-- ===== connection-packet field (drift toward central orb @600,180) ===== -->
  <g fill="#ccccff">
    <circle cx="96"  cy="54"  r="1.5"><animate attributeName="opacity" values="0;0.7;0" dur="3.1s" begin="0.0s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 2 1.4; 0 0" dur="3.1s" begin="0.0s" repeatCount="indefinite"/></circle>
    <circle cx="168" cy="232" r="1.5"><animate attributeName="opacity" values="0;0.65;0" dur="3.6s" begin="0.4s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 2.4 -1; 0 0" dur="3.6s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="244" cy="120" r="1.5"><animate attributeName="opacity" values="0;0.7;0" dur="2.6s" begin="1.1s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 2.8 1; 0 0" dur="2.6s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="300" r="1.5"><animate attributeName="opacity" values="0;0.6;0" dur="3.9s" begin="0.7s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 2 -1.6; 0 0" dur="3.9s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="360" cy="40"  r="1.5"><animate attributeName="opacity" values="0;0.72;0" dur="2.9s" begin="1.6s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 2.6 1.8; 0 0" dur="2.9s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="200" r="1.5"><animate attributeName="opacity" values="0;0.68;0" dur="3.3s" begin="0.2s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 3 0.6; 0 0" dur="3.3s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="96"  r="1.5"><animate attributeName="opacity" values="0;0.7;0" dur="2.4s" begin="2.0s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 2.4 1.2; 0 0" dur="2.4s" begin="2.0s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="280" r="1.5"><animate attributeName="opacity" values="0;0.6;0" dur="3.7s" begin="1.3s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 2.8 -1.4; 0 0" dur="3.7s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="70"  r="1.5"><animate attributeName="opacity" values="0;0.7;0" dur="3.0s" begin="0.9s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -2.6 1.6; 0 0" dur="3.0s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="730" cy="262" r="1.5"><animate attributeName="opacity" values="0;0.66;0" dur="3.5s" begin="0.0s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -3 -1; 0 0" dur="3.5s" begin="0.0s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="150" r="1.5"><animate attributeName="opacity" values="0;0.72;0" dur="2.7s" begin="1.8s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -2.8 0.4; 0 0" dur="2.7s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="840" cy="44"  r="1.5"><animate attributeName="opacity" values="0;0.6;0" dur="3.8s" begin="0.5s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -2.4 1.8; 0 0" dur="3.8s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="210" r="1.5"><animate attributeName="opacity" values="0;0.7;0" dur="3.2s" begin="1.4s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -3 -0.8; 0 0" dur="3.2s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="956" cy="100" r="1.5"><animate attributeName="opacity" values="0;0.66;0" dur="2.5s" begin="2.1s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -2.6 1.2; 0 0" dur="2.5s" begin="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="1004" cy="288" r="1.5"><animate attributeName="opacity" values="0;0.6;0" dur="3.6s" begin="0.8s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -2.2 -1.6; 0 0" dur="3.6s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="60"  r="1.5"><animate attributeName="opacity" values="0;0.7;0" dur="3.0s" begin="1.9s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -2.8 2; 0 0" dur="3.0s" begin="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="1116" cy="178" r="1.5"><animate attributeName="opacity" values="0;0.64;0" dur="3.4s" begin="0.3s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -3 0.2; 0 0" dur="3.4s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="250" r="1.5"><animate attributeName="opacity" values="0;0.6;0" dur="2.8s" begin="1.2s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -2.4 -1.4; 0 0" dur="2.8s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="132" cy="160" r="1.5"><animate attributeName="opacity" values="0;0.68;0" dur="3.5s" begin="2.2s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 3 -0.6; 0 0" dur="3.5s" begin="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="50" r="1.5"><animate attributeName="opacity" values="0;0.72;0" dur="2.6s" begin="0.6s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 1.6 2; 0 0" dur="2.6s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="320" r="1.5"><animate attributeName="opacity" values="0;0.6;0" dur="3.9s" begin="1.5s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 1.8 -2.2; 0 0" dur="3.9s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="660" cy="310" r="1.5"><animate attributeName="opacity" values="0;0.64;0" dur="3.1s" begin="0.1s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -1.6 -2.2; 0 0" dur="3.1s" begin="0.1s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="40" r="1.5"><animate attributeName="opacity" values="0;0.7;0" dur="2.9s" begin="2.3s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; -1.4 2.4; 0 0" dur="2.9s" begin="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="330" r="1.5"><animate attributeName="opacity" values="0;0.6;0" dur="3.7s" begin="1.0s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 0; 2.2 -2; 0 0" dur="3.7s" begin="1.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== central heartbeat orb @ (600,180) ===== -->
  <g>
    <!-- pulse rings expanding OUT through the packets, ~900ms beat -->
    <circle cx="600" cy="180" r="34" fill="none" stroke="#3ad29f" stroke-width="2">
      <animate attributeName="r" values="34;120" dur="2.7s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="2.7s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2.4;0.2" dur="2.7s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="180" r="34" fill="none" stroke="#3ad29f" stroke-width="2">
      <animate attributeName="r" values="34;120" dur="2.7s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="2.7s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2.4;0.2" dur="2.7s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="180" r="34" fill="none" stroke="#3ad29f" stroke-width="2">
      <animate attributeName="r" values="34;120" dur="2.7s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="2.7s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2.4;0.2" dur="2.7s" begin="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- soft halo bloom -->
    <circle cx="600" cy="180" r="96" fill="url(#orbHalo)" filter="url(#soft)">
      <animate attributeName="opacity" values="0.5;0.95;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- breathing core -->
    <circle cx="600" cy="180" r="40" fill="url(#orbCore)">
      <animate attributeName="r" values="38;46;38" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="180" r="9" fill="#eafff7">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- vignette edges -->
  <rect width="1200" height="360" fill="url(#vignette)"/>

  <!-- ===== title + tagline ===== -->
  <g font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" text-anchor="middle">
    <text x="600" y="176" text-anchor="middle" font-size="64" font-weight="700" fill="#3ad29f" opacity="0.45" filter="url(#softText)">Unity MCP</text>
    <text x="600" y="176" text-anchor="middle" font-size="64" font-weight="700" fill="url(#titleGrad)" letter-spacing="1.5">Unity MCP</text>
    <text x="600" y="224" text-anchor="middle" font-size="19" font-weight="400" fill="#888899" letter-spacing="0.4">Control Unity from Claude with <!-- STAT:TOOLS -->98<!-- /STAT --> token-minimized tools and batch operations</text>
    <g>
      <rect x="560" y="246" width="80" height="2" rx="1" fill="#e94560" opacity="0.9"/>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="3.6s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
