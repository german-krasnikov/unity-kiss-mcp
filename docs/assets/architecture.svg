<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" width="960" height="240" role="img" aria-label="Unity MCP architecture: Claude Code → Python MCP Server → TCP :9500 → Unity Editor Plugin">
  <defs>
    <style>
      .node-bg   { fill: #111125; }
      .lbl-main  { font-family: ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace; font-size: 12px; font-weight: 700; fill: #ffffff; }
      .lbl-sub   { font-family: ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace; font-size: 9.5px; fill: #888899; }
      .lbl-wire  { font-family: ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace; font-size: 9px; fill: #888899; text-anchor: middle; }
      @keyframes march    { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
      @keyframes march-r  { from { stroke-dashoffset: 0;  } to { stroke-dashoffset: 24; } }
      @keyframes breathe  { 0%,100% { opacity:.35; } 50% { opacity:.85; } }
      @keyframes tcp-glow { 0%,100% { opacity:.5; } 50% { opacity:1; } }
      .fwd  { animation: march   .6s linear infinite; }
      .rev  { animation: march-r .6s linear infinite; }
      .np   { animation: breathe 3s ease-in-out infinite; }
      .np2  { animation: breathe 3s ease-in-out infinite; animation-delay:.8s; }
      .np3  { animation: breathe 3s ease-in-out infinite; animation-delay:1.6s; }
      .tcp  { animation: tcp-glow 2s ease-in-out infinite; }
    </style>
    <filter id="g3" x="-25%" y="-50%" width="150%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g7" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b">
        <animate attributeName="stdDeviation" values="4;9;4" dur="2s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pg" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <!-- node positions: N1=10..185, N2=245..465, N3=525..695, N4=755..950 -->
    <!-- wire gaps: W1=185..245, W2=465..525, W3=695..755 -->
    <path id="p1f" d="M 187,105 L 243,105"/>
    <path id="p1r" d="M 243,135 L 187,135"/>
    <path id="p2f" d="M 467,105 L 523,105"/>
    <path id="p2r" d="M 523,135 L 467,135"/>
    <path id="p3f" d="M 697,105 L 753,105"/>
    <path id="p3r" d="M 753,135 L 697,135"/>
  </defs>

  <rect width="960" height="240" fill="#1a1a2e"/>

  <!-- grid -->
  <g stroke="#888899" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="60"  x2="960" y2="60"/>
    <line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="180" x2="960" y2="180"/>
    <line x1="240" y1="0" x2="240" y2="240"/>
    <line x1="480" y1="0" x2="480" y2="240"/>
    <line x1="720" y1="0" x2="720" y2="240"/>
  </g>

  <!-- ==== NODE 1: Claude Code ==== -->
  <rect x="10" y="70" width="175" height="100" rx="10" fill="none" stroke="#3ad29f" stroke-width="7" opacity="0.12" filter="url(#g3)" class="np"/>
  <rect x="10" y="70" width="175" height="100" rx="10" class="node-bg"/>
  <rect x="10" y="70" width="175" height="100" rx="10" fill="none" stroke="#3ad29f" stroke-width="1.5"/>
  <text x="97" y="109" text-anchor="middle" class="lbl-main">Claude Code</text>
  <text x="97" y="126" text-anchor="middle" class="lbl-sub">MCP Client</text>

  <!-- ==== WIRE 1 ==== -->
  <line x1="187" y1="105" x2="243" y2="105" stroke="#3ad29f" stroke-width="1.5" stroke-dasharray="5 5" class="fwd"/>
  <line x1="187" y1="135" x2="243" y2="135" stroke="#ccccff" stroke-width="1.2" stroke-dasharray="5 5" class="rev"/>
  <text x="215" y="97" class="lbl-wire">stdio</text>
  <text x="215" y="148" class="lbl-wire" fill="#ccccff" opacity="0.55">response</text>
  <!-- fwd packets -->
  <circle r="4" fill="#e94560">
    <animateMotion dur="1.2s" begin="0s"    repeatCount="indefinite"><mpath href="#p1f"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="1.2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <!-- return packet -->
  <circle r="3.5" fill="#ccccff">
    <animateMotion dur="1.4s" begin="0.4s"  repeatCount="indefinite"><mpath href="#p1r"/></animateMotion>
    <animate attributeName="opacity" values="0;.7;.7;0" keyTimes="0;.1;.9;1" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- ==== NODE 2: Python MCP Server ==== -->
  <rect x="245" y="70" width="220" height="100" rx="10" fill="none" stroke="#3ad29f" stroke-width="7" opacity="0.12" filter="url(#g3)" class="np2"/>
  <rect x="245" y="70" width="220" height="100" rx="10" class="node-bg"/>
  <rect x="245" y="70" width="220" height="100" rx="10" fill="none" stroke="#3ad29f" stroke-width="1.5"/>
  <text x="355" y="103" text-anchor="middle" class="lbl-main">Python MCP Server</text>
  <text x="355" y="119" text-anchor="middle" class="lbl-sub">89 Tools · Middleware</text>
  <text x="355" y="133" text-anchor="middle" class="lbl-sub">Filtering · Plugin System</text>

  <!-- ==== WIRE 2 ==== -->
  <line x1="467" y1="105" x2="523" y2="105" stroke="#3ad29f" stroke-width="1.5" stroke-dasharray="5 5" class="fwd" style="animation-delay:.2s"/>
  <line x1="467" y1="135" x2="523" y2="135" stroke="#ccccff" stroke-width="1.2" stroke-dasharray="5 5" class="rev" style="animation-delay:.2s"/>
  <text x="495" y="97" class="lbl-wire">TCP :9500</text>
  <text x="495" y="148" class="lbl-wire" fill="#ccccff" opacity="0.55">text resp</text>
  <circle r="4" fill="#e94560">
    <animateMotion dur="1.2s" begin="0.3s"  repeatCount="indefinite"><mpath href="#p2f"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#ccccff">
    <animateMotion dur="1.4s" begin="0.8s"  repeatCount="indefinite"><mpath href="#p2r"/></animateMotion>
    <animate attributeName="opacity" values="0;.7;.7;0" keyTimes="0;.1;.9;1" dur="1.4s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- ==== NODE 3: TCP :9500 — breathing glow ==== -->
  <rect x="525" y="67" width="170" height="106" rx="11" fill="none" stroke="#3ad29f" stroke-width="12" opacity="0.08" filter="url(#g7)" class="tcp"/>
  <rect x="525" y="70" width="170" height="100" rx="10" class="node-bg"/>
  <rect x="525" y="70" width="170" height="100" rx="10" fill="none" stroke="#3ad29f" stroke-width="2"/>
  <text x="610" y="108" text-anchor="middle" class="lbl-main" fill="#3ad29f">TCP :9500</text>
  <text x="610" y="124" text-anchor="middle" class="lbl-sub">4-byte BE framing</text>
  <text x="610" y="138" text-anchor="middle" class="lbl-sub">JSON · Heartbeat</text>

  <!-- ==== WIRE 3 ==== -->
  <line x1="697" y1="105" x2="753" y2="105" stroke="#3ad29f" stroke-width="1.5" stroke-dasharray="5 5" class="fwd" style="animation-delay:.4s"/>
  <line x1="697" y1="135" x2="753" y2="135" stroke="#ccccff" stroke-width="1.2" stroke-dasharray="5 5" class="rev" style="animation-delay:.4s"/>
  <text x="725" y="97" class="lbl-wire">commands</text>
  <text x="725" y="148" class="lbl-wire" fill="#ccccff" opacity="0.55">results</text>
  <circle r="4" fill="#e94560">
    <animateMotion dur="1.2s" begin="0.6s"  repeatCount="indefinite"><mpath href="#p3f"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.1;.9;1" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#ccccff">
    <animateMotion dur="1.4s" begin="1.1s"  repeatCount="indefinite"><mpath href="#p3r"/></animateMotion>
    <animate attributeName="opacity" values="0;.7;.7;0" keyTimes="0;.1;.9;1" dur="1.4s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- ==== NODE 4: Unity Editor Plugin ==== -->
  <rect x="755" y="70" width="195" height="100" rx="10" fill="none" stroke="#3ad29f" stroke-width="7" opacity="0.12" filter="url(#g3)" class="np3"/>
  <rect x="755" y="70" width="195" height="100" rx="10" class="node-bg"/>
  <rect x="755" y="70" width="195" height="100" rx="10" fill="none" stroke="#3ad29f" stroke-width="1.5"/>
  <text x="852" y="103" text-anchor="middle" class="lbl-main">Unity Editor Plugin</text>
  <text x="852" y="119" text-anchor="middle" class="lbl-sub">CommandRouter · Serializers</text>
  <text x="852" y="133" text-anchor="middle" class="lbl-sub">RefManager · PlaytestRunner</text>

</svg>
