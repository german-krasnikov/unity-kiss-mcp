<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="1200" height="40" role="img" aria-label="wave divider">
  <defs>
    <linearGradient id="w-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="20%"  stop-color="#3ad29f" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#3ad29f" stop-opacity="0.8"/>
      <stop offset="80%"  stop-color="#3ad29f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="w-grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="20%"  stop-color="#ccccff" stop-opacity="0.3"/>
      <stop offset="50%"  stop-color="#ccccff" stop-opacity="0.5"/>
      <stop offset="80%"  stop-color="#ccccff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="w-glow" x="-5%" y="-200%" width="110%" height="500%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <rect width="1200" height="40" fill="#1a1a2e"/>

  <!-- sine wave 1: mint, shifts right -->
  <path d="M0,20 C50,10 100,10 150,20 S250,30 300,20 S400,10 450,20 S550,30 600,20 S700,10 750,20 S850,30 900,20 S1000,10 1050,20 S1150,30 1200,20"
    fill="none" stroke="url(#w-grad)" stroke-width="2" filter="url(#w-glow)"
    stroke-dasharray="80 40" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="0;-120" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- sine wave 2: lavender, shifts left (counter-phase) -->
  <path d="M0,20 C50,28 100,28 150,20 S250,12 300,20 S400,28 450,20 S550,12 600,20 S700,28 750,20 S850,12 900,20 S1000,28 1050,20 S1150,12 1200,20"
    fill="none" stroke="url(#w-grad2)" stroke-width="1.5" filter="url(#w-glow)"
    stroke-dasharray="60 60" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="0;120" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- red accent node at intersection -->
  <circle cx="600" cy="20" r="2.5" fill="#e94560">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
