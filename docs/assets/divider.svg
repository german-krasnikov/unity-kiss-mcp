<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="1200" height="40" role="img" aria-label="divider">
  <defs>
    <linearGradient id="baseLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="25%"  stop-color="#888899" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#3ad29f" stop-opacity="0.55"/>
      <stop offset="75%"  stop-color="#888899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ccccff" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#ccccff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#eafff7" stop-opacity="0.95"/>
      <stop offset="55%"  stop-color="#ccccff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ccccff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-300%" width="140%" height="700%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <rect width="1200" height="40" fill="#1a1a2e"/>

  <!-- base hairline -->
  <rect x="0" y="19" width="1200" height="2" fill="url(#baseLine)"/>

  <!-- breathing mint glow underneath -->
  <rect x="0" y="18.5" width="1200" height="3" fill="#3ad29f" filter="url(#glow)">
    <animate attributeName="opacity" values="0.18;0.4;0.18" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- sweeping shimmer -->
  <rect x="0" y="18" width="1200" height="4" fill="url(#shimmer)"/>

  <!-- accent-red tension tick, rare pulse -->
  <circle cx="600" cy="20" r="2" fill="#e94560">
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.45;0.5;0.55;1" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;2;3;2;2" keyTimes="0;0.45;0.5;0.55;1" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
