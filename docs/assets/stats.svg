<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 960 120" width="960" height="120" role="img" aria-label="Unity MCP stats: 99 MCP tools, 6399 Tests (2723 Python + 3593 Unity + 83 Live), 80-95% Batch Savings">
  <defs>
    <filter id="sg" x="-25%" y="-30%" width="150%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="c1"><rect x="10"  y="8" width="290" height="104" rx="10"/></clipPath>
    <clipPath id="c2"><rect x="335" y="8" width="290" height="104" rx="10"/></clipPath>
    <clipPath id="c3"><rect x="660" y="8" width="290" height="104" rx="10"/></clipPath>
  </defs>

  <rect width="960" height="120" fill="#1a1a2e"/>
  <line x1="0" y1="60" x2="960" y2="60" stroke="#888919" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ===== CARD 1: Tools ===== -->
  <rect x="10" y="8" width="290" height="104" rx="10" fill="none" stroke="#3ad29f" stroke-width="8" opacity="0.12" filter="url(#sg)">
    <animate attributeName="opacity" values="0.25;0.7;0.25" dur="3s" repeatCount="indefinite" begin="0s"/>
  </rect>
  <rect x="10" y="8" width="290" height="104" rx="10" fill="#111125"/>
  <rect x="10" y="8" width="290" height="104" rx="10" fill="none" stroke="#3ad29f" stroke-width="1.2"/>
  <g clip-path="url(#c1)">
    <rect x="10" y="8" width="60" height="104" fill="#3ad29f" fill-opacity="0.10">
      <animateTransform attributeName="transform" type="translate" values="-100,0;400,0" dur="3s" repeatCount="indefinite" begin="0s"/>
    </rect>
  </g>
  <text x="155" y="60" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="36" font-weight="700" fill="#ffffff"><!-- STAT:TOOLS -->99<!-- /STAT --></text>
  <text x="155" y="78" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="10" font-weight="700" fill="#ccccff" letter-spacing="1.5">MCP TOOLS</text>
  <rect x="120" y="86" width="70" height="2" rx="1" fill="#3ad29f">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0s"/>
  </rect>

  <!-- ===== CARD 2: Tests ===== -->
  <rect x="335" y="8" width="290" height="104" rx="10" fill="none" stroke="#3ad29f" stroke-width="8" opacity="0.12" filter="url(#sg)">
    <animate attributeName="opacity" values="0.25;0.7;0.25" dur="3s" repeatCount="indefinite" begin="0.6s"/>
  </rect>
  <rect x="335" y="8" width="290" height="104" rx="10" fill="#111125"/>
  <rect x="335" y="8" width="290" height="104" rx="10" fill="none" stroke="#3ad29f" stroke-width="1.2"/>
  <g clip-path="url(#c2)">
    <rect x="335" y="8" width="60" height="104" fill="#3ad29f" fill-opacity="0.10">
      <animateTransform attributeName="transform" type="translate" values="-100,0;400,0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
  </g>
  <text x="480" y="48" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="36" font-weight="700" fill="#ffffff"><!-- STAT:TESTS -->6399<!-- /STAT --></text>
  <text x="480" y="66" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="10" font-weight="700" fill="#ccccff" letter-spacing="1.5">TESTS PASSING</text>
  <text x="480" y="80" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="9" fill="#888919">2472 Python &#x00B7; 3699 Unity &#x00B7; 80 Live</text>
  <rect x="445" y="90" width="70" height="2" rx="1" fill="#3ad29f">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.4s"/>
  </rect>

  <!-- ===== CARD 3: Savings ===== -->
  <rect x="660" y="8" width="290" height="104" rx="10" fill="none" stroke="#3ad29f" stroke-width="8" opacity="0.12" filter="url(#sg)">
    <animate attributeName="opacity" values="0.25;0.7;0.25" dur="3s" repeatCount="indefinite" begin="1.2s"/>
  </rect>
  <rect x="660" y="8" width="290" height="104" rx="10" fill="#111125"/>
  <rect x="660" y="8" width="290" height="104" rx="10" fill="none" stroke="#3ad29f" stroke-width="1.2"/>
  <g clip-path="url(#c3)">
    <rect x="660" y="8" width="60" height="104" fill="#3ad29f" fill-opacity="0.10">
      <animateTransform attributeName="transform" type="translate" values="-100,0;400,0" dur="3s" repeatCount="indefinite" begin="1.0s"/>
    </rect>
  </g>
  <text x="805" y="57" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="36" font-weight="700" fill="#ffffff">80&#x2013;95%</text>
  <text x="805" y="75" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="10" font-weight="700" fill="#ccccff" letter-spacing="1.5">BATCH SAVINGS</text>
  <text x="805" y="90" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="9" fill="#888919">token reduction per batch</text>
  <rect x="770" y="82" width="70" height="2" rx="1" fill="#3ad29f">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.8s"/>
  </rect>

</svg>
