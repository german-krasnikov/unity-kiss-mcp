<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40" width="1200" height="40" role="img" aria-label="pulse divider">
  <defs>
    <linearGradient id="p-base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="30%"  stop-color="#3ad29f" stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="#3ad29f" stop-opacity="0.6"/>
      <stop offset="70%"  stop-color="#3ad29f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="p-glow" x="-5%" y="-300%" width="110%" height="700%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="40" fill="#1a1a2e"/>

  <!-- base line -->
  <line x1="0" y1="20" x2="1200" y2="20" stroke="url(#p-base)" stroke-width="1.5"/>

  <!-- expanding ring 1 (left of center) -->
  <circle cx="500" cy="20" r="3" fill="none" stroke="#3ad29f" stroke-width="1.5" opacity="0" filter="url(#p-glow)">
    <animate attributeName="r" values="3;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- expanding ring 2 (center) -->
  <circle cx="600" cy="20" r="3" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0" filter="url(#p-glow)">
    <animate attributeName="r" values="3;50" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.8;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- expanding ring 3 (right of center) -->
  <circle cx="700" cy="20" r="3" fill="none" stroke="#ccccff" stroke-width="1.5" opacity="0" filter="url(#p-glow)">
    <animate attributeName="r" values="3;40" dur="3s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.6;0" dur="3s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- center dot: heartbeat pump -->
  <circle cx="600" cy="20" r="3" fill="#e94560">
    <animate attributeName="r" values="3;4.5;3" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- flanking dots -->
  <circle cx="500" cy="20" r="2" fill="#3ad29f">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="20" r="2" fill="#ccccff">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" begin="1s"/>
  </circle>
</svg>
