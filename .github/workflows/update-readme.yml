name: Update README stats

on:
  push:
    branches: [master]
    paths:
      - "server/**"
      - "unity-plugin/**"
      - "CHANGELOG.md"
    paths-ignore:
      - "README.md"
      - ".github/badges/**"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (for pytest collection)
        run: |
          pip install pytest
          pip install -e server/[dev] --quiet

      - name: Run update_readme.py
        run: python scripts/update_readme.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update README stats [skip ci]"
          file_pattern: "README.md .github/badges/*.json docs/assets/stats.svg"
